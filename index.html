<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>冠冕</title>
    <style>
        /* 定義跳動動畫 */
        @keyframes glitch-anim {
            0% { transform: translate(0); text-shadow: -2px 0 red, 2px 0 blue; }
            20% { transform: translate(-2px, 2px); text-shadow: 2px 0 red, -2px 0 blue; }
            40% { transform: translate(-2px, -2px); text-shadow: -2px 0 green, 2px 0 red; }
            60% { transform: translate(2px, 2px); text-shadow: 2px 0 blue, -2px 0 green; }
            80% { transform: translate(2px, -2px); text-shadow: -2px 0 red, 2px 0 blue; }
            100% { transform: translate(0); }
        }

        /* 建立亂碼專用的類別 */
        .glitch {
            display: inline-block;
            font-family: 'Courier New', monospace; /* 使用等寬字體更有程式錯誤感 */
            font-weight: bold;
            color: #ff4d4d; /* 妳可以改成妳想要的顏色，例如酒紅 */
            animation: glitch-anim 0.25s infinite; /* 數字越小跳動越快 */
            position: relative;
        }

        .note {
            background-color: #fdf5e6; /* 淡淡的紙張米黃色 */
            color: #2c3e50;            /* 深藍灰色的墨水色 */
            padding: 20px;
            margin: 15px auto;
            width: 80%;
            border-left: 5px solid #d4af37; /* 金色的邊緣暗示公爵府的格調 */
            font-family: 'Zhi Mang Xing', cursive; /* 使用手寫字體 */
            font-size: 1.4em;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3); /* 陰影讓紙張有立體感 */
            line-height: 1.5;
            transform: rotate(-1deg);  /* 稍微歪一點，更有隨手塞入的感覺 */
        }

        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #game-container {
            width: 80%;
            max-width: 800px;
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }
        #stats-panel {
            display: flex;
            justify-content: space-between;
            background: #3d3d3d;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9em;
            margin-bottom: 20px;
            border-bottom: 2px solid #555;
        }
        #story-text {
            line-height: 1.8;
            font-size: 1.1em;
            min-height: 200px;
            margin-bottom: 20px;
            white-space: pre-wrap;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            background-color: #4a4a4a;
            color: white;
            border: 1px solid #666;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            text-align: left;
            transition: 0.3s;
            font-size: 1em;
        }
        button:hover {
            background-color: #606060;
            border-color: #888;
        }
        input[type="text"] {
            padding: 10px;
            width: 200px;
            border-radius: 5px;
            border: none;
            margin-right: 10px;
        }
        .highlight { color: #d4af37; font-weight: bold; }
        .system-msg { color: #888; font-style: italic; font-size: 0.9em; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="stats-panel">
        <div>角色: <span id="stat-name">待定</span></div>
        <div>皇太子好感度: <span id="stat-prince">0</span></div>
        <div>騎士好感度: <span id="stat-knight">0</span></div>
        <div>權力地位: <span id="stat-power">0</span></div>
        <div>家族認可: <span id="stat-family">0</span></div>
        <div>？？: <span id="stat-mystery">0</span></div>
    </div>

    <div id="story-text"></div>

    <div id="interaction-area" class="options">
        </div>
</div>

<script src="script.js"></script>

</body>
</html>
