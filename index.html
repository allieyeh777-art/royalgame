<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>冠冕</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #game-container {
            width: 80%;
            max-width: 800px;
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }
        #stats-panel {
            display: flex;
            justify-content: space-between;
            background: #3d3d3d;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9em;
            margin-bottom: 20px;
            border-bottom: 2px solid #555;
        }
        #story-text {
            line-height: 1.8;
            font-size: 1.1em;
            min-height: 200px;
            margin-bottom: 20px;
            white-space: pre-wrap;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            background-color: #4a4a4a;
            color: white;
            border: 1px solid #666;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            text-align: left;
            transition: 0.3s;
            font-size: 1em;
        }
        button:hover {
            background-color: #606060;
            border-color: #888;
        }
        input[type="text"] {
            padding: 10px;
            width: 200px;
            border-radius: 5px;
            border: none;
            margin-right: 10px;
        }
        .highlight { color: #d4af37; font-weight: bold; }
        .system-msg { color: #888; font-style: italic; font-size: 0.9em; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="stats-panel">
        <div>角色: <span id="stat-name">待定</span></div>
        <div>皇太子好感度: <span id="stat-prince">0</span></div>
        <div>騎士好感度: <span id="stat-knight">0</span></div>
        <div>權力地位: <span id="stat-power">0</span></div>
        <div>家族認可: <span id="stat-family">0</span></div>
        <div>？？: <span id="stat-mystery">0</span></div>
    </div>

    <div id="story-text"></div>

    <div id="interaction-area" class="options">
        </div>
</div>

<script src="script.js"></script>

</body>
</html>
